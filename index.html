<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>執筆支援アプリ 再設計版</title>
  <style>
    :root{
      --bg:#0f1020;--surface:#16182d;--surface-2:#1c2140;--surface-3:#0d1124;
      --line:rgba(167,139,250,.22);--line-strong:rgba(167,139,250,.5);
      --text:#f5f3ff;--muted:#b6b2d6;--dim:#837ea9;
      --accent:#8b5cf6;--accent-2:#a78bfa;--accent-soft:rgba(139,92,246,.16);
      --danger:#ef4444;--danger-soft:rgba(239,68,68,.12);
      --warn:#f59e0b;--warn-soft:rgba(245,158,11,.12);
      --ok:#10b981;--ok-soft:rgba(16,185,129,.12);
      --shadow:0 16px 40px rgba(0,0,0,.35);--radius:16px;--radius-sm:10px;
      --topbar-h:64px;
    }
    *{box-sizing:border-box} html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:"Hiragino Sans","Noto Sans JP","Yu Gothic UI",sans-serif}
    body{min-height:100vh} button,input,select,textarea{font:inherit} button{cursor:pointer}
    .app{min-height:100vh;display:grid;grid-template-columns:280px minmax(0,1fr);background:radial-gradient(circle at top right, rgba(139,92,246,.18), transparent 26%),linear-gradient(180deg,#0d0f1b 0%,#101326 100%)}
    .sidebar{border-right:1px solid var(--line);background:rgba(12,14,30,.92);position:sticky;top:0;height:100vh;overflow:auto;padding:20px 16px 24px}
    .brand{padding:8px 8px 16px;border-bottom:1px solid var(--line);margin-bottom:16px}
    .brand h1{margin:0;font-size:1rem;color:var(--accent-2);letter-spacing:.04em}.brand p{margin:.45rem 0 0;color:var(--dim);font-size:.78rem;line-height:1.6}
    .sidebar-actions{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 14px}.sidebar-section-title{font-size:.74rem;color:var(--dim);text-transform:uppercase;letter-spacing:.12em;margin:18px 8px 10px}
    .work-list,.stack,.record-list,.snapshot-list,.chapter-list,.chapter-card{display:flex;flex-direction:column;gap:12px}
    .work-item,.section-card,.chapter-list-card,.chapter-header{background:var(--surface);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow)}
    .work-item{padding:12px;border-radius:14px;transition:.18s ease}.work-item:hover{border-color:var(--line-strong);transform:translateY(-1px)}
    .work-item.active{border-color:var(--accent);box-shadow:0 0 0 1px rgba(139,92,246,.3),0 10px 24px rgba(0,0,0,.24);background:linear-gradient(180deg, rgba(139,92,246,.14), rgba(139,92,246,.06))}
    .work-item-top,.chapter-item-top,.record-head,.char-head,.chapter-header-top,.snapshot-item,.section-head,.work-summary{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
    .work-title,.chapter-title,.record-title{font-weight:700;line-height:1.5}
    .work-meta,.chapter-meta,.record-meta,.topbar-sub,.chapter-header .meta{display:flex;gap:8px;flex-wrap:wrap;color:var(--dim);font-size:.74rem}
    .main{min-width:0;display:flex;flex-direction:column}.topbar{position:sticky;top:0;z-index:30;height:var(--topbar-h);border-bottom:1px solid var(--line);background:rgba(18,20,38,.9);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 24px}
    .topbar-title{margin:0;font-size:1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .content{padding:20px 24px 28px;min-width:0}.hidden{display:none !important}
    .empty-main{min-height:calc(100vh - var(--topbar-h) - 40px);display:grid;place-items:center;text-align:center;color:var(--muted)}
    .empty-main .inner{max-width:540px;background:var(--surface);border:1px solid var(--line);border-radius:22px;padding:36px 28px;box-shadow:var(--shadow)}
    .empty-main h2{margin:.4rem 0 0;font-size:1.35rem}.empty-main p{line-height:1.8;color:var(--dim)}
    .work-shell{display:flex;flex-direction:column;gap:18px;min-width:0}
    .work-summary{padding:18px 20px}.work-summary h2{margin:0 0 10px;font-size:1.2rem}.work-summary p{margin:0;color:var(--muted);line-height:1.8;font-size:.9rem}
    .work-summary-stats{display:grid;grid-template-columns:repeat(2,minmax(110px,1fr));gap:10px;min-width:260px}
    .stat-card{background:var(--surface-3);border:1px solid var(--line);border-radius:14px;padding:12px}.stat-card .label{font-size:.72rem;color:var(--dim)}.stat-card .value{font-size:1rem;font-weight:700;margin-top:4px}
    .sticky-tabs{position:sticky;top:var(--topbar-h);z-index:25;background:linear-gradient(180deg, rgba(15,16,32,.96), rgba(15,16,32,.92));backdrop-filter:blur(10px);padding:6px 0 10px}
    .tabbar{display:flex;gap:8px;flex-wrap:wrap;padding:6px;background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}
    .tab{border:1px solid transparent;background:transparent;color:var(--muted);padding:12px 16px;border-radius:12px;font-weight:700;font-size:.87rem;transition:.18s ease}
    .tab:hover{background:rgba(255,255,255,.03);color:var(--text)}.tab.active{color:var(--accent-2);background:var(--accent-soft);border-color:var(--line-strong)}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .section-head{padding:16px 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg, rgba(139,92,246,.14), rgba(139,92,246,.04))}
    .section-head h3{margin:0;font-size:.98rem;color:var(--accent-2)} .section-head p{margin:6px 0 0;font-size:.78rem;line-height:1.7;color:var(--dim)}
    .section-body{padding:18px}.field{display:flex;flex-direction:column;gap:6px}.field label{font-size:.8rem;color:var(--muted);font-weight:700}.field label .req{color:var(--accent-2);margin-left:4px}
    .hint,.footer-note{font-size:.72rem;color:var(--dim);line-height:1.6}
    input[type="text"],select,textarea,input[type="file"]{width:100%;border-radius:12px;border:1px solid var(--line);background:var(--surface-3);color:var(--text);padding:12px 13px;outline:none;transition:.18s ease}
    input[type="text"]:focus,select:focus,textarea:focus,input[type="file"]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(139,92,246,.12)}
    textarea{resize:vertical;min-height:110px;line-height:1.8}.small-input{max-width:240px}
    .btn{border:1px solid var(--line);background:var(--surface-3);color:var(--text);border-radius:12px;padding:10px 14px;font-size:.85rem;font-weight:700;transition:.18s ease}
    .btn:hover{transform:translateY(-1px);border-color:var(--line-strong)} .btn.primary{background:linear-gradient(180deg,#8b5cf6,#6d28d9);border-color:rgba(255,255,255,.08);box-shadow:0 10px 20px rgba(109,40,217,.25)}
    .btn.soft{background:var(--accent-soft);color:var(--accent-2)} .btn.warn{background:var(--warn-soft);color:#fbbf24;border-color:rgba(245,158,11,.3)} .btn.danger{background:var(--danger-soft);color:#fca5a5;border-color:rgba(239,68,68,.3)} .btn.ghost{background:transparent}
    .btn-row,.badge-row,.warning-list,.prompt-source-list,.topbar-actions,.sidebar-actions{display:flex;gap:8px;flex-wrap:wrap}
    .badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:5px 10px;font-size:.73rem;font-weight:700;border:1px solid var(--line);background:var(--surface-3);color:var(--muted)}
    .badge.accent{background:var(--accent-soft);color:var(--accent-2);border-color:var(--line-strong)} .badge.ok{background:var(--ok-soft);color:#6ee7b7;border-color:rgba(16,185,129,.28)} .badge.warn{background:var(--warn-soft);color:#fbbf24;border-color:rgba(245,158,11,.28)} .badge.danger{background:var(--danger-soft);color:#fca5a5;border-color:rgba(239,68,68,.28)}
    .mini-note,.excerpt-box,.prompt-preview,.char-card,.record,.snapshot-item,.chapter-item,.accordion{background:var(--surface-3);border:1px solid var(--line);border-radius:16px}
    .mini-note{padding:12px 14px;color:var(--muted);font-size:.8rem;line-height:1.8}
    .accordion{overflow:hidden}.accordion summary{list-style:none;cursor:pointer;padding:15px 18px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;font-weight:700;color:var(--text);background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,0))}
    .accordion summary small{display:block;color:var(--dim);font-size:.75rem;font-weight:500;margin-top:5px;line-height:1.6}.accordion .section-body{border-top:1px solid var(--line)}
    .pm-three{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.prompt-preview{padding:14px;min-height:240px;white-space:pre-wrap;line-height:1.85;overflow:auto;color:var(--muted);font-size:.86rem}.prompt-preview.empty{color:var(--dim);font-style:italic}.ordered-list{margin:0;padding-left:1.3rem;line-height:1.9;color:var(--muted);font-size:.86rem}
    .char-card{padding:14px}.vault-layout{display:grid;grid-template-columns:320px minmax(0,1fr);gap:18px;min-width:0}.chapter-list-card{overflow:hidden;min-height:720px;display:flex;flex-direction:column}
    .chapter-list{padding:14px;overflow:auto}.chapter-item{padding:12px;transition:.18s ease}.chapter-item.active{border-color:var(--accent);background:linear-gradient(180deg, rgba(139,92,246,.16), rgba(139,92,246,.05))} .chapter-item:hover{border-color:var(--line-strong)}
    .chapter-header{padding:18px}.chapter-header h3{margin:0;font-size:1.05rem}.inner-scroll{max-height:360px;overflow:auto}
    .excerpt-box{padding:12px 14px;color:var(--muted);line-height:1.8;white-space:pre-wrap;font-size:.82rem;max-height:180px;overflow:auto}
    .record{overflow:hidden}.record-head{padding:14px}.record-body{border-top:1px solid var(--line);padding:0 14px 14px;white-space:pre-wrap;line-height:1.8;color:var(--muted);font-size:.84rem}
    .backup-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .toast-wrap{position:fixed;right:20px;bottom:20px;z-index:100;display:flex;flex-direction:column;gap:10px}.toast{min-width:260px;max-width:440px;padding:12px 14px;border-radius:14px;border:1px solid var(--line);background:rgba(17,20,37,.96);box-shadow:var(--shadow);color:var(--text);font-size:.84rem;line-height:1.65}
    .toast.ok{border-color:rgba(16,185,129,.35)}.toast.warn{border-color:rgba(245,158,11,.35)}.toast.error{border-color:rgba(239,68,68,.35)}
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:24px;z-index:80;backdrop-filter:blur(8px)} .modal-backdrop.open{display:flex}
    .modal{width:min(680px, 100%);max-height:min(85vh, 920px);overflow:auto;background:var(--surface);border:1px solid var(--line-strong);border-radius:22px;box-shadow:var(--shadow)}
    .modal-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:14px;align-items:flex-start}.modal-body{padding:18px}.modal-foot{padding:16px 18px;border-top:1px solid var(--line);display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    @media (max-width:1200px){.vault-layout{grid-template-columns:280px minmax(0,1fr)}.pm-three{grid-template-columns:1fr}}
    @media (max-width:980px){.app{grid-template-columns:1fr}.sidebar{position:relative;height:auto;border-right:none;border-bottom:1px solid var(--line)}.work-summary{flex-direction:column}.work-summary-stats{min-width:0;width:100%}.grid-2,.grid-3,.backup-grid,.vault-layout{grid-template-columns:1fr}.chapter-list-card{min-height:auto}}
    @media (max-width:720px){.content{padding:16px}.topbar{padding:10px 14px;height:auto;min-height:var(--topbar-h);align-items:flex-start}.tab{width:100%;text-align:left}.work-summary-stats{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>執筆支援アプリ 再設計版</h1>
        <p>アウトラインを中核導線から外し、「今章契約」と「前章引継ぎ」を中心に章制御する単一HTML版です。</p>
      </div>
      <div class="sidebar-actions">
        <button class="btn primary" onclick="openNewWorkModal()">＋ 新規作品</button>
        <button class="btn ghost" onclick="exportAllData()">全体バックアップ</button>
      </div>
      <div class="sidebar-section-title">作品一覧</div>
      <div id="sidebar-work-list" class="work-list"></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-main">
          <h2 id="topbar-title" class="topbar-title">作品を選択してください</h2>
          <div id="topbar-sub" class="topbar-sub">保存先: ブラウザのローカルストレージ</div>
        </div>
        <div class="topbar-actions">
          <button class="btn ghost" onclick="saveSnapshot()">スナップショット保存</button>
          <button class="btn soft" onclick="renderActivePanel()">再描画</button>
        </div>
      </header>

      <div class="content">
        <section id="empty-state" class="empty-main hidden">
          <div class="inner">
            <div class="badge accent">再設計版</div>
            <h2>まずは作品を1つ作成してください</h2>
            <p>この版では、執筆保管庫を「章本文 / 今章契約 / 前章引継ぎ」の3項目へ整理し、プロンプトメーカーを「今回の執筆意図」を組み立てる場所として再構成しています。</p>
            <div class="btn-row" style="justify-content:center;margin-top:18px">
              <button class="btn primary" onclick="openNewWorkModal()">＋ 新規作品を作る</button>
            </div>
          </div>
        </section>

        <section id="work-root" class="work-shell hidden">
          <div id="work-summary" class="work-summary"></div>
          <div class="sticky-tabs"><div id="tabbar" class="tabbar"></div></div>
          <div id="panel-root"></div>
        </section>
      </div>
    </main>
  </div>

  <div id="toast-wrap" class="toast-wrap"></div>

  <div id="modal-new-work" class="modal-backdrop">
    <div class="modal">
      <div class="modal-head">
        <div><strong>新規作品を追加</strong><div class="hint" style="margin-top:6px">執筆作品タイトルは作品タイトルを初期値として自動で入ります。</div></div>
        <button class="btn ghost" onclick="closeModal('modal-new-work')">閉じる</button>
      </div>
      <div class="modal-body stack">
        <div class="field"><label>作品タイトル <span class="req">*</span></label><input id="new-work-title" type="text" placeholder="例：雨の駅で、君を待つ" /></div>
        <div class="grid-2">
          <div class="field"><label>ジャンル</label><select id="new-work-genre"><option value="BL">BL</option><option value="TL">TL</option><option value="一般">一般</option></select></div>
          <div class="field"><label>状態</label><select id="new-work-status"><option value="planning">構想中</option><option value="writing">執筆中</option><option value="done">完了</option></select></div>
        </div>
      </div>
      <div class="modal-foot"><button class="btn ghost" onclick="closeModal('modal-new-work')">キャンセル</button><button class="btn primary" onclick="createWork()">作成する</button></div>
    </div>
  </div>

  <div id="modal-import" class="modal-backdrop">
    <div class="modal">
      <div class="modal-head">
        <div><strong>バックアップを読み込む</strong><div class="hint" style="margin-top:6px">この操作では現在のデータを置き換えます。</div></div>
        <button class="btn ghost" onclick="closeModal('modal-import')">閉じる</button>
      </div>
      <div class="modal-body stack"><div class="field"><label>JSONファイルを選択</label><input id="import-file" type="file" accept=".json,application/json" /></div></div>
      <div class="modal-foot"><button class="btn ghost" onclick="closeModal('modal-import')">キャンセル</button><button class="btn warn" onclick="importAllData()">読み込む</button></div>
    </div>
  </div>

  <script>

const STORAGE_KEY = 'writing-redesign-app-v1';
const TAB_META = 'meta';
const TAB_ANALYSIS = 'analysis';
const TAB_PROMPT = 'prompt';
const TAB_VAULT = 'vault';
const TAB_BACKUP = 'backup';

const WORK_STATUS = {
  planning: {label: '構想中', cls: 'badge'},
  writing:  {label: '執筆中', cls: 'badge warn'},
  done:     {label: '完了', cls: 'badge ok'}
};

const CHAPTER_STATUS = {
  new: {label: '新規', cls: 'badge'},
  wip: {label: '執筆中', cls: 'badge warn'},
  done:{label: '完了', cls: 'badge ok'}
};

let appState = loadState();

function uid(prefix='id'){ return prefix + '-' + Math.random().toString(36).slice(2,8) + '-' + Date.now().toString(36); }
function nowIso(){ return new Date().toISOString(); }
function esc(value=''){ return String(value).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;'); }
function formatDate(iso){
  if(!iso) return '未更新';
  const d = new Date(iso);
  if(Number.isNaN(d.getTime())) return '未更新';
  return new Intl.DateTimeFormat('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).format(d);
}
function clone(value){ return JSON.parse(JSON.stringify(value)); }
function emptyContract(){ return { role:'', mustHappen:'', mustNot:'', endFact:'', endEmotion:'', endRelation:'', nextFire:'', wordBudget:'' }; }
function emptyHandoff(){ return { factState:'', emotionProtagonist:'', emotionPartner:'', emotionOthers:'', relationDistance:'', relationPublic:'', relationGap:'', physicalPlace:'', physicalTime:'', physicalRecent:'', physicalItems:'', openPromise:'', openMisunderstanding:'', foreshadow:'', pressure:'', expressionTone:'', expressionPOV:'', expressionLimit:'', expressionMustNotBreak:'' }; }
function emptyPromptCharacter(){ return { id: uid('char'), name:'', currentEmotion:'', attitude:'', mustNotBreak:'', tone:'', relation:'' }; }
function emptyChapter(number, title=''){ return { id: uid('chapter'), number, title: title || `第${number}章`, status: number === 1 ? 'wip' : 'new', updatedAt: nowIso(), body:'', contract: emptyContract(), handoff: emptyHandoff() }; }

function sampleWork(){
  const chapter1 = emptyChapter(1, '再会の駅');
  chapter1.status = 'done';
  chapter1.body = [
    'ホームに降りた瞬間、湿った夜気の匂いが頬に触れた。',
    '主人公は改札前の柱にもたれたまま、約束の時間を十五分過ぎても来ない相手を待っている。',
    'やがて相手が現れ、「来ると思ってなかった」と低く言う。',
    '主人公は怒る代わりに笑ってみせるが、その笑いが少しだけ震える。',
    '去るはずだった距離が、言えなかった本音のせいで、かえって近づいてしまう。',
    '雨が落ち始める。二人は同じ傘に入るしかなくなる。'
  ].join('\n');
  chapter1.contract = {
    role: '離れていた二人を同じ場に戻し、会話再開の最低条件を整える章。',
    mustHappen: '・主人公が待っていた事実を明示する\n・相手が遅れて現れる\n・会話が完全な修復ではなく、揺れを残したまま接続する',
    mustNot: '・ここで和解を完了させない\n・告白まで進めない\n・過去の誤解を全回収しない',
    endFact: '二人は同じ傘に入り、駅前から並んで歩き出している。',
    endEmotion: '怒りと安堵が同時に残り、どちらも飲み切れていない。',
    endRelation: '断絶からは戻ったが、まだ触れれば崩れる薄い接続状態。',
    nextFire: '言えなかった約束違反の真相が次章で圧力になる。',
    wordBudget: '3500〜5000字'
  };
  chapter1.handoff = {
    factState: '三週間前のすれ違い以来、二人はまともに会っていない。',
    emotionProtagonist: '会いたかった気持ちを怒りで隠している。',
    emotionPartner: '謝罪したいが、理由を言えば関係を壊すと恐れている。',
    emotionOthers: '周囲の人間は事情を知らず、単なる再会に見えている。',
    relationDistance: '私的には遠い。だが他人から見ればまだ親しい。',
    relationPublic: '旧知の仲。',
    relationGap: '言葉より沈黙のほうが本音を含んでいる。',
    physicalPlace: '地方駅のホーム〜改札前。',
    physicalTime: '夜、雨の降り出し。',
    physicalRecent: '主人公は先に着き、待ち続けていた。',
    physicalItems: '相手は折り畳み傘を持っている。',
    openPromise: '三週間前の「ちゃんと話す」という約束。',
    openMisunderstanding: '相手が約束を破った理由を主人公は知らない。',
    foreshadow: '相手のコート袖がわずかに濡れている。',
    pressure: '時間切れになれば主人公は帰るつもりでいる。',
    expressionTone: '静かな緊張を保つ。',
    expressionPOV: '三人称・主人公寄り。',
    expressionLimit: '相手の内面は断定しすぎない。',
    expressionMustNotBreak: '主人公は本音をすぐに言葉へしない。'
  };

  const chapter2 = emptyChapter(2, '傘の下の停戦');
  chapter2.status = 'wip';
  chapter2.contract = {
    role: '再会後の歩行シーンで、会話と沈黙の両方から感情の揺れを進める章。',
    mustHappen: '・同じ傘に入る\n・短い言い争いと、それを止める沈黙が入る\n・次章へ真相告白の圧を残す',
    mustNot: '・過去の出来事を説明し尽くさない\n・関係修復を断定しない',
    endFact: '', endEmotion: '', endRelation: '', nextFire: '', wordBudget: '4000〜6000字'
  };
  chapter2.handoff = {
    factState: '二人は駅を出て、同じ傘に入って歩き始めた。',

function defaultState(){ const work = sampleWork(); return { selectedWorkId: work.id, activeTab: TAB_VAULT, works: [work] }; }
function loadState(){ try { const raw = localStorage.getItem(STORAGE_KEY); if(!raw) return defaultState(); const parsed = JSON.parse(raw); if(!parsed || !Array.isArray(parsed.works)) return defaultState(); return parsed; } catch (error) { console.error(error); return defaultState(); } }
function saveState(silent=true){ localStorage.setItem(STORAGE_KEY, JSON.stringify(appState)); if(!silent) toast('保存しました。', 'ok'); }
function currentWork(){ return appState.works.find(work => work.id === appState.selectedWorkId) || null; }
function touchWork(work){ work.updatedAt = nowIso(); }
function workTitle(work){ return work?.meta?.title?.trim() || '無題の作品'; }
function hasMeaningfulChapterContract(contract){ return Object.values(contract || {}).some(v => String(v || '').trim()); }
function hasMeaningfulChapterHandoff(handoff){ return Object.values(handoff || {}).some(v => String(v || '').trim()); }
function chapterWarnings(chapter){ const warnings = []; if(!hasMeaningfulChapterContract(chapter.contract)) warnings.push('契約未入力'); if(!hasMeaningfulChapterHandoff(chapter.handoff)) warnings.push('引継ぎ未入力'); if(!(chapter.body || '').trim()) warnings.push('本文未入力'); return warnings; }
function chapterWordCount(body=''){ return (body || '').replace(/\s+/g, '').length; }
function getChapterById(work, chapterId){ return work.chapters.find(ch => ch.id === chapterId) || null; }
function sortedChapters(work){ return [...work.chapters].sort((a,b) => a.number - b.number); }
function previousChapter(work, chapter){ if(!chapter) return null; const list = sortedChapters(work); const idx = list.findIndex(item => item.id === chapter.id); if(idx <= 0) return null; return list[idx - 1]; }
function nextChapter(work, chapter){ if(!chapter) return null; const list = sortedChapters(work); const idx = list.findIndex(item => item.id === chapter.id); if(idx < 0 || idx >= list.length - 1) return null; return list[idx + 1]; }
function chapterExcerpt(body, length=240){ const clean = String(body || '').trim(); if(!clean) return ''; return clean.slice(Math.max(0, clean.length - length)); }
function getSelectedChapter(work){ const chapterId = work.promptMaker.selectedChapterId || work.chapters[0]?.id; let chapter = getChapterById(work, chapterId); if(!chapter && work.chapters[0]) { chapter = sortedChapters(work)[0]; work.promptMaker.selectedChapterId = chapter.id; } return chapter || null; }
function statusBadge(statusMap, key){ const item = statusMap[key] || statusMap.planning || statusMap.new; return `<span class="${item.cls}">${esc(item.label)}</span>`; }


function renderApp(){
  renderSidebar();
  renderTopbar();
  renderWorkSummary();
  renderTabbar();
  renderActivePanel();
  const hasWork = !!currentWork();
  document.getElementById('empty-state').classList.toggle('hidden', hasWork);
  document.getElementById('work-root').classList.toggle('hidden', !hasWork);
}

function renderSidebar(){
  const root = document.getElementById('sidebar-work-list');
  if(!appState.works.length){
    root.innerHTML = `<div class="mini-note">まだ作品がありません。<br>左上の「＋ 新規作品」から作成してください。</div>`;
    return;
  }
  const works = [...appState.works].sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt));
  root.innerHTML = works.map(work => {
    const warningCount = work.chapters.reduce((sum, ch) => sum + chapterWarnings(ch).length, 0);
    return `
      <div class="work-item ${work.id === appState.selectedWorkId ? 'active' : ''}">
        <div class="work-item-top">
          <div style="min-width:0">
            <div class="work-title">${esc(workTitle(work))}</div>
            <div class="work-meta">
              <span>${esc(work.meta.genre || '未設定')}</span>
              <span>章 ${work.chapters.length}</span>
              <span>更新 ${esc(formatDate(work.updatedAt))}</span>
            </div>
          </div>
          ${statusBadge(WORK_STATUS, work.meta.status)}
        </div>
        <div class="warning-list">
          ${warningCount ? `<span class="badge danger">欠落警告 ${warningCount}</span>` : `<span class="badge ok">欠落なし</span>`}
        </div>
        <div class="btn-row">
          <button class="btn soft" onclick="selectWork('${work.id}')">開く</button>
          <button class="btn ghost" onclick="duplicateWork('${work.id}')">複製</button>
          <button class="btn danger" onclick="deleteWork('${work.id}')">削除</button>
        </div>
      </div>
    `;
  }).join('');
}

function renderTopbar(){
  const work = currentWork();
  document.getElementById('topbar-title').textContent = work ? workTitle(work) : '作品を選択してください';
  document.getElementById('topbar-sub').innerHTML = work ? `最終更新 ${esc(formatDate(work.updatedAt))}<span>章数 ${work.chapters.length}</span><span>分析記録 ${work.analysisRecords.length}</span><span>保存先: ブラウザのローカルストレージ</span>` : '保存先: ブラウザのローカルストレージ';
}

function renderWorkSummary(){
  const work = currentWork();
  const root = document.getElementById('work-summary');
  if(!work){ root.innerHTML = ''; return; }
  const currentChapter = getSelectedChapter(work);
  const warnings = work.chapters.reduce((sum, ch) => sum + chapterWarnings(ch).length, 0);
  root.innerHTML = `
    <div style="min-width:0">
      <div class="badge-row">
        ${statusBadge(WORK_STATUS, work.meta.status)}
        <span class="badge accent">${esc(work.meta.genre || '未設定')}</span>
        <span class="badge">${work.chapters.length}章</span>
      </div>
      <h2>${esc(workTitle(work))}</h2>

      <div class="stat-card"><div class="label">執筆プロンプト</div><div class="value">${work.promptMaker.generatedPrompt ? '生成済み' : '未生成'}</div></div>

function renderTabbar(){
  const root = document.getElementById('tabbar');
  const tabs = [
    {id: TAB_META, label: 'メタ情報・本文'},
    {id: TAB_ANALYSIS, label: '分析結果・エクスポート'},
    {id: TAB_PROMPT, label: 'プロンプトメーカー'},
    {id: TAB_VAULT, label: '執筆保管庫'},
    {id: TAB_BACKUP, label: 'バックアップ'}
  ];
  root.innerHTML = tabs.map(tab => `<button class="tab ${appState.activeTab === tab.id ? 'active' : ''}" onclick="switchTab('${tab.id}')">${esc(tab.label)}</button>`).join('');
}

function renderActivePanel(){
  const work = currentWork();
  const root = document.getElementById('panel-root');
  if(!work){ root.innerHTML = ''; return; }
  if(appState.activeTab === TAB_META) root.innerHTML = renderMetaPanel(work);
  else if(appState.activeTab === TAB_ANALYSIS) root.innerHTML = renderAnalysisPanel(work);
  else if(appState.activeTab === TAB_PROMPT) root.innerHTML = renderPromptPanel(work);
  else if(appState.activeTab === TAB_VAULT) root.innerHTML = renderVaultPanel(work);
  else root.innerHTML = renderBackupPanel(work);
}

function formatHandoffForPreview(handoff){
  if(!handoff) return '';
  const parts = [
    ['事実状態', handoff.factState],
    ['感情状態：主人公', handoff.emotionProtagonist],
    ['感情状態：相手', handoff.emotionPartner],
    ['関係性状態：距離感', handoff.relationDistance],
    ['物理状況', [handoff.physicalPlace, handoff.physicalTime, handoff.physicalRecent].filter(Boolean).join(' / ')],
    ['未解決事項', [handoff.openPromise, handoff.openMisunderstanding, handoff.foreshadow, handoff.pressure].filter(Boolean).join(' / ')],
    ['表現上の注意', [handoff.expressionTone, handoff.expressionPOV, handoff.expressionLimit, handoff.expressionMustNotBreak].filter(Boolean).join(' / ')]
  ].filter(([, value]) => String(value || '').trim());
  return parts.map(([label, value]) => `${label}: ${value}`).join('\n');
}

function formatContractForPreview(contract){
  if(!contract) return '';
  const parts = [
    ['この章の役割', contract.role],
    ['必ず起こすこと', contract.mustHappen],
    ['やってはいけないこと', contract.mustNot],
    ['終わりの事実', contract.endFact],
    ['終わりの感情', contract.endEmotion],
    ['終わりの関係性', contract.endRelation],
    ['次章へ持ち越す火種', contract.nextFire],
    ['文字数予算帯', contract.wordBudget]
  ].filter(([, value]) => String(value || '').trim());
  return parts.map(([label, value]) => `${label}: ${value}`).join('\n');
}

function validatePrompt(work, chapter){
  const checks = {
    title: !!(work.promptMaker.writingTitle || '').trim(),
    sceneSituation: !!(work.promptMaker.scene.situation || '').trim(),
    sceneLine: !!(work.promptMaker.scene.line || '').trim(),
    promptDirection: !!(work.promptMaker.promptA.direction || '').trim(),
    promptAvoid: !!(work.promptMaker.promptA.avoid || '').trim(),
    characters: work.promptMaker.characters.some(ch => (ch.name || '').trim() && (ch.mustNotBreak || '').trim()),
    chapterContract: chapter ? hasMeaningfulChapterContract(chapter.contract) : false,
    chapterHandoff: chapter ? hasMeaningfulChapterHandoff(chapter.handoff) : false
  };
  const missing = [];
  if(!checks.title) missing.push('執筆作品タイトル');
  if(!checks.sceneSituation) missing.push('どんな場面');
  if(!checks.sceneLine) missing.push('どんなセリフ');
  if(!checks.promptDirection) missing.push('この場面をどう書きたいか');
  if(!checks.promptAvoid) missing.push('避けたい方向');
  if(!checks.characters) missing.push('主要キャラ選択 / 崩してはいけない反応');
  if(!checks.chapterContract) missing.push('今章契約');
  if(!checks.chapterHandoff) missing.push('前章引継ぎ');
  return { ok: missing.length === 0, missing, fields: checks };
}

function buildPrompt(work, chapter){
  const prev = previousChapter(work, chapter);
  const prevExcerpt = prev ? chapterExcerpt(prev.body, 300) : '';
  const characters = work.promptMaker.characters
    .filter(ch => (ch.name || '').trim() || (ch.mustNotBreak || '').trim())
    .map(ch => [
      `【キャラ名】 ${ch.name || '未入力'}`,
      ch.currentEmotion ? `【この場面での現在感情】 ${ch.currentEmotion}` : '',
      ch.attitude ? `【相手への態度】 ${ch.attitude}` : '',
      ch.mustNotBreak ? `【崩してはいけない反応】 ${ch.mustNotBreak}` : '',
      ch.tone ? `【口調・会話温度】 ${ch.tone}` : '',
      ch.relation ? `【関係性の現在地】 ${ch.relation}` : ''
    ].filter(Boolean).join('\n')).join('\n\n');

  const scene = [
    `【どんな場面】\n${work.promptMaker.scene.situation}`,
    `【どんなセリフ】\n${work.promptMaker.scene.line}`,
    work.promptMaker.scene.emotion ? `【その場面に流れている感情】\n${work.promptMaker.scene.emotion}` : '',
    work.promptMaker.scene.focus ? `【この場面で一番見せたいこと】\n${work.promptMaker.scene.focus}` : ''
  ].filter(Boolean).join('\n\n');

  const promptA = [
    `【この場面をどう書きたいか】\n${work.promptMaker.promptA.direction}`,
    work.promptMaker.promptA.lineEffect ? `【セリフをどう効かせたいか】\n${work.promptMaker.promptA.lineEffect}` : '',
    work.promptMaker.promptA.emotionFlow ? `【感情をどう流したいか】\n${work.promptMaker.promptA.emotionFlow}` : '',
    `【避けたい方向】\n${work.promptMaker.promptA.avoid}`
  ].filter(Boolean).join('\n\n');

  const outputConditions = [
    `【文字数目安】 ${work.promptMaker.outputConditions.length || work.outputSettings.lengthGuide || '未指定'}`,
    `【出力形式】 ${work.promptMaker.outputConditions.style || '小説本文'}`,
    `【視点】 ${work.outputSettings.pov || '未指定'}`,
    `【文体】 ${work.outputSettings.tone || '未指定'}`,
    work.outputSettings.extra ? `【補足条件】 ${work.outputSettings.extra}` : '',
    work.promptMaker.outputConditions.additional ? `【追加の出力条件】 ${work.promptMaker.outputConditions.additional}` : ''
  ].filter(Boolean).join('\n');

  return [
    `あなたは小説執筆補助AIです。以下の情報を順番どおりに読み、対象章だけを書いてください。`,
    '',
    `# 1. 全体プロット前提`, work.meta.overallPlot || '未入力',
    '',
    `# 2. 今回必要なキャラクター条件`, characters || '未入力',
    '',
    `# 3. 前章引継ぎ`, formatHandoffForPreview(chapter.handoff) || '未入力',
    '',
    `# 4. 今章契約`, formatContractForPreview(chapter.contract) || '未入力',
    '',
    `# 5. 描きたいシーン`, scene,
    '',
    `# 6. プロンプトA`, promptA,
    '',
    `# 7. 前章末尾抜粋`, prevExcerpt || '前章なし、または本文未入力',
    '',
    `# 8. 出力条件`, outputConditions,
    '',
    `# 追加指示`,
    `- 対象は第${chapter.number}章「${chapter.title || '無題'}」のみ。`,
    `- 今章契約を超えて未来章の展開を書かないこと。`,
    `- 前章引継ぎの確定状態を崩さないこと。`,
    `- キャラクター設計で指定した「崩してはいけない反応」を必ず守ること。`,
    `- 完成稿ではなく、この章の本文として自然な連続性を持たせること。`
  ].join('\n');
}

function switchTab(tabId){ appState.activeTab = tabId; saveState(); renderTabbar(); renderActivePanel(); }
function selectWork(workId){ appState.selectedWorkId = workId; const work = currentWork(); if(work && !work.promptMaker.selectedChapterId && work.chapters[0]) work.promptMaker.selectedChapterId = sortedChapters(work)[0].id; saveState(); renderApp(); }
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

function openNewWorkModal(){
  document.getElementById('new-work-title').value = '';
  document.getElementById('new-work-genre').value = 'BL';
  document.getElementById('new-work-status').value = 'planning';
  openModal('modal-new-work');
  setTimeout(() => document.getElementById('new-work-title').focus(), 30);
}

function createWork(){
  const title = document.getElementById('new-work-title').value.trim();
  if(!title){ toast('作品タイトルを入力してください。', 'error'); return; }
  const genre = document.getElementById('new-work-genre').value;
  const status = document.getElementById('new-work-status').value;
  const chapter1 = emptyChapter(1);
  const work = {
    id: uid('work'),
    updatedAt: nowIso(),
    meta: { title, genre, status, premise:'', overallPlot:'', notes:'' },
    outputSettings: { lengthGuide:'4000〜6000字', pov:'', tone:'', extra:'' },
    analysisRecords: [],
    promptMaker: { writingTitle:title, selectedChapterId:chapter1.id, scene:{situation:'', line:'', emotion:'', focus:''}, promptA:{direction:'', avoid:'', lineEffect:'', emotionFlow:''}, characters:[emptyPromptCharacter()], outputConditions:{length:'4000〜6000字', style:'小説本文', additional:''}, generatedPrompt:'', lastGeneratedAt:'' },
    chapters: [chapter1],
    backups: []
  };
  appState.works.unshift(work);
  appState.selectedWorkId = work.id;
  appState.activeTab = TAB_META;
  saveState(false);
  closeModal('modal-new-work');
  renderApp();
}

function duplicateWork(workId){
  const target = appState.works.find(work => work.id === workId);
  if(!target) return;
  const copy = clone(target);
  copy.id = uid('work');
  copy.meta.title = `${workTitle(target)}（コピー）`;
  copy.updatedAt = nowIso();
  copy.analysisRecords = copy.analysisRecords.map(record => ({...record, id: uid('record')}));
  copy.chapters = copy.chapters.map(ch => ({...ch, id: uid('chapter')}));
  copy.promptMaker.characters = copy.promptMaker.characters.map(ch => ({...ch, id: uid('char')}));
  const selectedChapter = getSelectedChapter(copy);
  copy.promptMaker.selectedChapterId = selectedChapter ? selectedChapter.id : '';
  copy.backups = [];
  appState.works.unshift(copy);
  appState.selectedWorkId = copy.id;
  saveState(false);
  renderApp();
  toast('作品を複製しました。', 'ok');
}

function deleteWork(workId){
  const work = appState.works.find(item => item.id === workId);
  if(!work) return;
  if(!confirm(`「${workTitle(work)}」を削除しますか？`)) return;
  appState.works = appState.works.filter(item => item.id !== workId);
  if(appState.selectedWorkId === workId) appState.selectedWorkId = appState.works[0]?.id || '';
  saveState(false);
  renderApp();
  toast('作品を削除しました。', 'warn');
}

function updateWorkMeta(key, value, syncWritingTitle=false){
  const work = currentWork(); if(!work) return;
  work.meta[key] = value;
  if(syncWritingTitle && key === 'title' && !(work.promptMaker.writingTitle || '').trim()) work.promptMaker.writingTitle = value;
  touchWork(work); saveState(); renderSidebar(); renderTopbar(); renderWorkSummary();
}

function updateOutputSetting(key, value){ const work = currentWork(); if(!work) return; work.outputSettings[key] = value; touchWork(work); saveState(); renderTopbar(); }
function addAnalysisRecord(){
  const work = currentWork(); if(!work) return;
  const type = document.getElementById('analysis-type-input').value.trim();
  const title = document.getElementById('analysis-title-input').value.trim();
  const content = document.getElementById('analysis-content-input').value.trim();
  if(!content){ toast('分析内容を入力してください。', 'error'); return; }
  work.analysisRecords.unshift({ id: uid('record'), type, title: title || '無題の分析記録', content, createdAt: nowIso(), expanded: false });
  touchWork(work); saveState(false); renderActivePanel(); renderTopbar(); renderWorkSummary();
  document.getElementById('analysis-type-input').value = ''; document.getElementById('analysis-title-input').value = ''; document.getElementById('analysis-content-input').value = '';
  toast('分析記録を追加しました。', 'ok');
}

function toggleAnalysisRecord(recordId){ const work = currentWork(); const record = work?.analysisRecords.find(item => item.id === recordId); if(!record) return; record.expanded = !record.expanded; saveState(); renderActivePanel(); }
function deleteAnalysisRecord(recordId){ const work = currentWork(); if(!work) return; if(!confirm('この分析記録を削除しますか？')) return; work.analysisRecords = work.analysisRecords.filter(item => item.id !== recordId); touchWork(work); saveState(false); renderActivePanel(); renderTopbar(); renderWorkSummary(); }
function updatePromptField(key, value){ const work = currentWork(); if(!work) return; work.promptMaker[key] = value; touchWork(work); saveState(); renderWorkSummary(); }
function syncWritingTitleFromMeta(){ const work = currentWork(); if(!work) return; work.promptMaker.writingTitle = work.meta.title || ''; touchWork(work); saveState(false); renderActivePanel(); toast('作品タイトルを執筆作品タイトルへ反映しました。', 'ok'); }
function updatePromptNested(section, key, value){ const work = currentWork(); if(!work) return; work.promptMaker[section][key] = value; touchWork(work); saveState(); }
function updatePromptCharacter(charId, key, value){ const work = currentWork(); if(!work) return; const character = work.promptMaker.characters.find(item => item.id === charId); if(!character) return; character[key] = value; touchWork(work); saveState(); }
function addPromptCharacter(){ const work = currentWork(); if(!work) return; work.promptMaker.characters.push(emptyPromptCharacter()); touchWork(work); saveState(false); renderActivePanel(); }
function removePromptCharacter(charId){ const work = currentWork(); if(!work) return; if(work.promptMaker.characters.length === 1){ toast('主要キャラは最低1件残してください。', 'warn'); return; } work.promptMaker.characters = work.promptMaker.characters.filter(item => item.id !== charId); touchWork(work); saveState(false); renderActivePanel(); }
function selectPromptChapter(chapterId){ const work = currentWork(); if(!work) return; work.promptMaker.selectedChapterId = chapterId; touchWork(work); saveState(); renderWorkSummary(); renderActivePanel(); }


    function generatePrompt(){
      const work = currentWork(); if(!work) return;
      const chapter = getSelectedChapter(work);
      const validation = validatePrompt(work, chapter);
      if(!validation.ok){ toast(`生成を停止しました: ${validation.missing.join(' / ')}`, 'error'); return; }
      work.promptMaker.generatedPrompt = buildPrompt(work, chapter);
      work.promptMaker.lastGeneratedAt = nowIso();
      touchWork(work); saveState(false); renderActivePanel(); renderWorkSummary(); toast('執筆プロンプトを生成しました。', 'ok');
    }

    function copyGeneratedPrompt(){
      const work = currentWork();
      if(!work?.promptMaker.generatedPrompt){ toast('先に執筆プロンプトを生成してください。', 'warn'); return; }
      navigator.clipboard.writeText(work.promptMaker.generatedPrompt).then(() => toast('執筆プロンプトをコピーしました。', 'ok')).catch(() => toast('コピーに失敗しました。', 'error'));
    }

    function downloadGeneratedPrompt(){
      const work = currentWork();
      if(!work?.promptMaker.generatedPrompt){ toast('先に執筆プロンプトを生成してください。', 'warn'); return; }
      const fileName = sanitizeFileName((work.promptMaker.writingTitle || work.meta.title || 'prompt')) + '-writing-prompt.md';
      downloadText(fileName, work.promptMaker.generatedPrompt);
    }

    function addChapter(){
      const work = currentWork(); if(!work) return;
      const nextNumber = (Math.max(0, ...work.chapters.map(ch => Number(ch.number) || 0)) + 1) || 1;
      const chapter = emptyChapter(nextNumber);
      work.chapters.push(chapter);
      work.promptMaker.selectedChapterId = chapter.id;
      touchWork(work); saveState(false); renderApp(); toast('章を追加しました。', 'ok');
    }

    function duplicateChapter(chapterId){
      const work = currentWork(); if(!work) return;
      const target = getChapterById(work, chapterId); if(!target) return;
      const copy = clone(target);
      copy.id = uid('chapter'); copy.number = Math.max(...work.chapters.map(ch => Number(ch.number) || 0)) + 1; copy.title = `${target.title || `第${target.number}章`}（コピー）`; copy.updatedAt = nowIso();
      work.chapters.push(copy); work.promptMaker.selectedChapterId = copy.id;
      touchWork(work); saveState(false); renderApp(); toast('章を複製しました。', 'ok');
    }

    function deleteChapter(chapterId){
      const work = currentWork(); if(!work) return;
      if(work.chapters.length === 1){ toast('最後の1章は削除できません。', 'warn'); return; }
      const chapter = getChapterById(work, chapterId); if(!chapter) return;
      if(!confirm(`第${chapter.number}章を削除しますか？`)) return;
      work.chapters = work.chapters.filter(ch => ch.id !== chapterId);
      if(work.promptMaker.selectedChapterId === chapterId) work.promptMaker.selectedChapterId = sortedChapters(work)[0]?.id || '';
      touchWork(work); saveState(false); renderApp(); toast('章を削除しました。', 'warn');
    }

    function updateChapterBasic(chapterId, key, value, rerender=false){
      const work = currentWork(); const chapter = work ? getChapterById(work, chapterId) : null; if(!chapter) return;
      chapter[key] = value; chapter.updatedAt = nowIso(); touchWork(work); saveState(); renderSidebar(); renderTopbar(); renderWorkSummary(); if(rerender) renderActivePanel();
    }

    function updateChapterNumber(chapterId, value){ const number = Number(value); if(!Number.isFinite(number) || number <= 0) return; updateChapterBasic(chapterId, 'number', number, true); }
    function updateChapterNested(chapterId, section, key, value){ const work = currentWork(); const chapter = work ? getChapterById(work, chapterId) : null; if(!chapter) return; chapter[section][key] = value; chapter.updatedAt = nowIso(); touchWork(work); saveState(); renderSidebar(); renderTopbar(); renderWorkSummary(); }
    function updateChapterBody(chapterId, value){ const work = currentWork(); const chapter = work ? getChapterById(work, chapterId) : null; if(!chapter) return; chapter.body = value; chapter.updatedAt = nowIso(); touchWork(work); saveState(); renderSidebar(); renderTopbar(); renderWorkSummary(); }

    function seedNextChapterFromCurrent(chapterId){
      const work = currentWork(); const chapter = work ? getChapterById(work, chapterId) : null; if(!chapter) return;
      let target = nextChapter(work, chapter);
      if(!target){ target = emptyChapter((Math.max(...work.chapters.map(ch => Number(ch.number) || 0)) + 1) || (chapter.number + 1), `第${chapter.number + 1}章`); work.chapters.push(target); }
      const bodyExcerpt = chapterExcerpt(chapter.body, 220);
      const merged = {
        factState: chapter.contract.endFact || target.handoff.factState,
        emotionProtagonist: chapter.contract.endEmotion || target.handoff.emotionProtagonist,
        emotionPartner: target.handoff.emotionPartner,
        emotionOthers: target.handoff.emotionOthers,
        relationDistance: chapter.contract.endRelation || target.handoff.relationDistance,
        relationPublic: target.handoff.relationPublic,
        relationGap: target.handoff.relationGap,
        physicalPlace: target.handoff.physicalPlace,
        physicalTime: target.handoff.physicalTime,
        physicalRecent: bodyExcerpt || target.handoff.physicalRecent,
        physicalItems: target.handoff.physicalItems,
        openPromise: target.handoff.openPromise,
        openMisunderstanding: target.handoff.openMisunderstanding,
        foreshadow: target.handoff.foreshadow,
        pressure: chapter.contract.nextFire || target.handoff.pressure,
        expressionTone: target.handoff.expressionTone || chapter.handoff.expressionTone,
        expressionPOV: target.handoff.expressionPOV || chapter.handoff.expressionPOV,
        expressionLimit: target.handoff.expressionLimit || chapter.handoff.expressionLimit,
        expressionMustNotBreak: target.handoff.expressionMustNotBreak || chapter.handoff.expressionMustNotBreak
      };
      target.handoff = {...target.handoff, ...merged};
      target.updatedAt = nowIso();
      touchWork(work); work.promptMaker.selectedChapterId = target.id; saveState(false); renderApp(); toast(`第${target.number}章へ引継ぎ下書きを反映しました。`, 'ok');
    }

    function saveSnapshot(){
      const work = currentWork(); if(!work) return;
      const label = `${workTitle(work)} / ${formatDate(nowIso())}`;
      work.backups.push({ id: uid('snapshot'), label, createdAt: nowIso(), data: clone(work) });
      if(work.backups.length > 20) work.backups = work.backups.slice(work.backups.length - 20);
      touchWork(work); saveState(false); if(appState.activeTab === TAB_BACKUP) renderActivePanel(); renderWorkSummary(); toast('スナップショットを保存しました。', 'ok');
    }

    function restoreSnapshot(snapshotId){
      const work = currentWork(); if(!work) return;
      const snapshot = work.backups.find(item => item.id === snapshotId); if(!snapshot) return;
      if(!confirm('このスナップショットで現在の作品を上書きしますか？')) return;
      const restored = clone(snapshot.data); restored.id = work.id; restored.backups = work.backups;
      const idx = appState.works.findIndex(item => item.id === work.id);
      appState.works[idx] = restored; appState.selectedWorkId = restored.id; saveState(false); renderApp(); toast('スナップショットを復元しました。', 'ok');
    }

    function deleteSnapshot(snapshotId){ const work = currentWork(); if(!work) return; work.backups = work.backups.filter(item => item.id !== snapshotId); touchWork(work); saveState(false); renderActivePanel(); renderWorkSummary(); toast('スナップショットを削除しました。', 'warn'); }

    function exportCurrentWork(){ const work = currentWork(); if(!work) return; downloadText(`${sanitizeFileName(workTitle(work))}.json`, JSON.stringify(work, null, 2)); }
    function exportAllData(){ downloadText('writing-redesign-backup.json', JSON.stringify(appState, null, 2)); }

    function importAllData(){
      const fileInput = document.getElementById('import-file');
      const file = fileInput.files && fileInput.files[0];
      if(!file){ toast('JSONファイルを選択してください。', 'error'); return; }
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          if(!parsed || !Array.isArray(parsed.works)) throw new Error('invalid');
          appState = parsed; saveState(false); closeModal('modal-import'); renderApp(); toast('バックアップを読み込みました。', 'ok');
        } catch (error) {
          console.error(error); toast('読み込みに失敗しました。形式を確認してください。', 'error');
        }
      };
      reader.readAsText(file, 'utf-8');
    }

    function downloadAnalysisMarkdown(){
      const work = currentWork(); if(!work) return;
      const lines = [`# ${workTitle(work)} / 分析記録`, ''];
      if(!work.analysisRecords.length) lines.push('分析記録はありません。');
      else {
        work.analysisRecords.forEach(record => {
          lines.push(`## ${record.title || '無題の分析記録'}`);
          lines.push(`- 種別: ${record.type || '未設定'}`);
          lines.push(`- 日時: ${formatDate(record.createdAt)}`);
          lines.push('');
          lines.push(record.content || '');
          lines.push('');
        });
      }
      downloadText(`${sanitizeFileName(workTitle(work))}-analysis.md`, lines.join('\n'));
    }

    function sanitizeFileName(name){ return String(name || 'file').replace(/[\\/:*?"<>|]+/g, '-').replace(/\s+/g, '_'); }
    function downloadText(filename, content){ const blob = new Blob([content], {type:'text/plain;charset=utf-8'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); }

    function toast(message, type='ok'){
      const wrap = document.getElementById('toast-wrap');
      const node = document.createElement('div');
      node.className = `toast ${type}`;
      node.textContent = message;
      wrap.appendChild(node);
      setTimeout(() => { node.style.opacity = '0'; node.style.transform = 'translateY(8px)'; node.style.transition = 'all .25s ease'; setTimeout(() => node.remove(), 250); }, 2600);
    }

    document.querySelectorAll('.modal-backdrop').forEach(el => {
      el.addEventListener('click', (event) => { if(event.target === el) el.classList.remove('open'); });
    });

    renderApp();
  </script>
</body>
